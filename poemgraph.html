<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=2">
<title>诗词图谱 · 中国古诗词知识图谱</title>
<style>
/* ══════════ 水墨设计系统 ══════════ */
:root{
  --ink:#1c1c1e;--ink2:#5c5c6e;--ink3:#9a9aaa;
  --paper:#f7f5f0;--paper2:#efece4;--paper3:#e8e5dc;
  --teal:#2d5a6b;--teal-l:#e4ecef;
  --mountain:#7899a8;--bamboo:#5a8a6a;--ochre:#a0603a;
  --silk:#f0e8cc;--silk-line:#8a7040;
  --border:#d8d4c8;--border2:#c8c2b2;
  --shadow:0 2px 12px rgba(28,28,30,.08);
  --shadow2:0 6px 28px rgba(28,28,30,.14);
  --r:14px;--r2:22px;
  --serif:"STKaiti","KaiTi","楷体","STSong","SimSun",serif;
  --sans:-apple-system,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{
  font-family:var(--sans);background:var(--paper);color:var(--ink);
  line-height:1.7;-webkit-font-smoothing:antialiased;
  background-image:radial-gradient(rgba(28,28,30,.018) 1px,transparent 1px);
  background-size:22px 22px;
}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
.serif{font-family:var(--serif)}
.sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)}

/* ══════════ 装饰水墨山形 ══════════ */
.ink-mountains{position:fixed;left:0;right:0;bottom:0;height:120px;pointer-events:none;opacity:.5;z-index:0}

/* ══════════ 角色 / 年级 选择蒙层 ══════════ */
.overlay{position:fixed;inset:0;z-index:200;background:rgba(247,245,240,.97);
  display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;
  background-image:radial-gradient(rgba(28,28,30,.02) 1px,transparent 1px);background-size:22px 22px}
.overlay h1{font-family:var(--serif);font-size:clamp(30px,6vw,52px);letter-spacing:.18em;margin-bottom:6px;font-weight:700}
.overlay .sub{color:var(--ink2);margin-bottom:6px;letter-spacing:.32em;font-size:14px}
.overlay .seal{display:inline-block;margin:14px 0 34px;color:var(--ochre);border:1.5px solid var(--ochre);
  border-radius:6px;padding:2px 10px;font-family:var(--serif);font-size:14px;letter-spacing:.2em;opacity:.85}
.opt-grid{display:flex;gap:16px;flex-wrap:wrap;justify-content:center;max-width:720px}
.opt-card{background:var(--paper2);border:1px solid var(--border);border-radius:var(--r);
  padding:22px 26px;min-width:150px;text-align:center;transition:.22s;box-shadow:var(--shadow)}
.opt-card:hover{transform:translateY(-4px);box-shadow:var(--shadow2);border-color:var(--teal)}
.opt-card .ic{font-size:38px;line-height:1;margin-bottom:10px}
.opt-card .nm{font-family:var(--serif);font-size:20px;font-weight:700;margin-bottom:4px}
.opt-card .ds{font-size:12px;color:var(--ink2)}
.grade-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;max-width:420px;width:100%}
.grade-btn{background:var(--paper2);border:1px solid var(--border);border-radius:var(--r);
  padding:20px 0;font-family:var(--serif);font-size:20px;font-weight:700;transition:.2s;box-shadow:var(--shadow)}
.grade-btn:hover{background:var(--teal);color:#fff;transform:translateY(-3px);border-color:var(--teal)}
.grade-btn small{display:block;font-size:11px;color:var(--ink3);font-weight:400;margin-top:3px;font-family:var(--sans)}
.grade-btn:hover small{color:rgba(255,255,255,.75)}
.back-link{margin-top:26px;color:var(--ink3);font-size:13px;background:none;text-decoration:underline}

/* ══════════ 顶栏 ══════════ */
#nav{position:sticky;top:0;z-index:100;background:rgba(247,245,240,.9);backdrop-filter:blur(10px);
  border-bottom:1px solid var(--border);display:flex;align-items:center;gap:14px;
  padding:10px 18px;flex-wrap:wrap}
.brand{font-family:var(--serif);font-size:22px;font-weight:700;letter-spacing:.12em;cursor:pointer;white-space:nowrap}
.brand .dot{color:var(--ochre)}
.vtabs{display:flex;gap:4px;flex-wrap:wrap}
.vtab{padding:7px 13px;border-radius:20px;font-size:14px;color:var(--ink2);transition:.18s;white-space:nowrap}
.vtab:hover{background:var(--paper2)}
.vtab.on{background:var(--teal);color:#fff}
.nav-right{margin-left:auto;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.chip{padding:6px 12px;border-radius:20px;border:1px solid var(--border);background:var(--paper2);
  font-size:13px;color:var(--ink);transition:.18s;white-space:nowrap}
.chip:hover{border-color:var(--teal);color:var(--teal)}
.chip .ic{margin-right:4px}
.mode-switch{display:inline-flex;border:1px solid var(--border);border-radius:20px;overflow:hidden}
.mode-switch button{padding:6px 12px;font-size:13px;color:var(--ink2);background:var(--paper2)}
.mode-switch button.on{background:var(--teal);color:#fff}

/* ══════════ 主容器 ══════════ */
#main{max-width:1240px;margin:0 auto;padding:24px 18px 100px;position:relative;z-index:1}
.view{display:none;animation:fade .4s}
.view.on{display:block}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.page-head{display:flex;align-items:baseline;gap:12px;margin-bottom:18px;flex-wrap:wrap}
.page-head h2{font-family:var(--serif);font-size:26px;font-weight:700;letter-spacing:.06em}
.page-head .hint{color:var(--ink3);font-size:13px}

/* ══════════ 年级入口 ══════════ */
.grade-section{margin-bottom:30px}
.grade-section h3{font-family:var(--serif);font-size:19px;margin-bottom:12px;display:flex;align-items:center;gap:10px}
.grade-section h3 .bar{width:4px;height:18px;background:var(--teal);border-radius:2px}
.glist{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:12px}
.gitem{background:var(--paper2);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;
  display:flex;align-items:center;gap:12px;transition:.2s;cursor:pointer;box-shadow:var(--shadow)}
.gitem:hover{transform:translateY(-3px);box-shadow:var(--shadow2);border-color:var(--teal)}
.gitem .gt{flex:1;min-width:0}
.gitem .gt b{font-family:var(--serif);font-size:18px;display:block}
.gitem .gt span{font-size:12px;color:var(--ink2)}
.gitem .star{font-size:13px;color:var(--ochre);white-space:nowrap}

/* ══════════ 卡片墙 ══════════ */
.filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px}
.fchip{padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:var(--paper2);
  font-size:13px;color:var(--ink2);transition:.18s}
.fchip:hover{border-color:var(--teal)}
.fchip.on{background:var(--ink);color:var(--paper);border-color:var(--ink)}
#cgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:16px}
.pcard{background:var(--paper2);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;
  transition:.22s;cursor:pointer;box-shadow:var(--shadow);position:relative}
.pcard:hover{transform:translateY(-5px);box-shadow:var(--shadow2)}
.pcard .moodbar{height:5px;background:var(--teal)}
.pcard .pc-in{padding:16px 18px 18px}
.pcard .pc-meta{font-size:12px;color:var(--ink2);margin-bottom:8px;display:flex;gap:8px;align-items:center}
.pcard .pc-meta .dyn{color:var(--ochre)}
.pcard .pc-title{font-family:var(--serif);font-size:24px;font-weight:700;margin-bottom:8px}
.pcard .pc-line{font-family:var(--serif);font-size:15px;color:var(--ink2);margin-bottom:12px;line-height:1.5}
.pcard .pc-tags{display:flex;gap:6px;flex-wrap:wrap}
.tag{font-size:11px;padding:2px 9px;border-radius:12px;background:var(--paper3);color:var(--ink2);border:1px solid var(--border)}
.pcard .pc-prog{position:absolute;top:12px;right:12px;font-size:12px;color:var(--ochre)}

/* ══════════ 通用图谱/地图/时间轴容器 ══════════ */
.canvas-wrap{position:relative;background:var(--paper2);border:1px solid var(--border);
  border-radius:var(--r);overflow:hidden;box-shadow:var(--shadow)}
#gcanvas{display:block;width:100%;height:560px;touch-action:none}
.controls{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;align-items:center}
.dchip{padding:5px 12px;border-radius:18px;border:1px solid var(--border);background:var(--paper2);
  font-size:12px;color:var(--ink2);transition:.16s}
.dchip.on{background:var(--ink);color:var(--paper);border-color:var(--ink)}
.dchip .sw{display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:5px;vertical-align:middle}
#gtooltip{position:absolute;pointer-events:none;background:var(--ink);color:var(--paper);
  font-size:12px;padding:4px 9px;border-radius:6px;opacity:0;transition:.1s;white-space:nowrap;z-index:5}
.gpop{position:absolute;background:var(--paper);border:1px solid var(--border2);border-radius:var(--r);
  box-shadow:var(--shadow2);padding:14px 16px;width:220px;z-index:8;display:none}
.gpop h4{font-family:var(--serif);font-size:18px;margin-bottom:4px}
.gpop p{font-size:13px;color:var(--ink2);margin-bottom:8px}
.gpop button{font-size:13px;color:var(--teal);text-decoration:underline}

/* ══════════ 地图 ══════════ */
#mapwrap{position:relative}
#mapsvg{display:block;width:100%;height:auto;background:var(--silk);border-radius:var(--r)}
.map-pop{position:absolute;background:rgba(247,245,240,.97);border:1px solid var(--silk-line);
  border-radius:var(--r);padding:12px 14px;width:200px;box-shadow:var(--shadow2);z-index:6;display:none}
.map-pop h4{font-family:var(--serif);font-size:16px}
.map-pop .pm{color:var(--teal);font-size:12px;margin-bottom:6px}
.map-pop .pl{font-size:13px;color:var(--ink2);padding:3px 0;border-top:1px solid var(--border);cursor:pointer}
.map-pop .pl:hover{color:var(--teal)}
.map-legend{display:flex;gap:16px;flex-wrap:wrap;margin-top:12px;font-size:12px;color:var(--ink2)}
.map-legend span{display:inline-flex;align-items:center;gap:6px}
.map-legend i{width:10px;height:10px;border-radius:50%;display:inline-block}
#mapsvg{cursor:grab;touch-action:none}
.map-marker{cursor:pointer;transition:transform .15s ease,fill .15s ease;transform-box:fill-box;transform-origin:center}
.map-marker:hover{fill:#a0603a;transform:scale(1.8)}
#mapsvg.grabbing{cursor:grabbing}
.map-zoom-ctrl{position:absolute;right:14px;bottom:14px;display:flex;flex-direction:column;gap:6px;z-index:7}
.map-zoom-ctrl button{width:34px;height:34px;border-radius:9px;background:rgba(247,245,240,.95);border:1px solid var(--silk-line);
  font-size:18px;color:var(--ink);box-shadow:var(--shadow);display:flex;align-items:center;justify-content:center;line-height:1}
.map-zoom-ctrl button:hover{background:var(--teal);color:#fff;border-color:var(--teal)}
.map-zoom-ctrl button.rz{font-size:13px}

/* ══════════ 时间轴 ══════════ */
#tlwrap{overflow-x:auto;padding:30px 0;background:var(--paper2);border:1px solid var(--border);
  border-radius:var(--r);box-shadow:var(--shadow)}
.tl-inner{position:relative;height:340px;min-width:1200px}
.tl-axis{position:absolute;left:0;right:0;top:170px;height:3px;background:var(--ink);opacity:.25}
.tl-era{position:absolute;top:150px;transform:translateX(-50%);font-family:var(--serif);
  font-size:16px;color:var(--ink2);padding:2px 10px}
.tl-era .yr{display:block;font-size:11px;color:var(--ink3);font-family:var(--sans)}
.tl-node{position:absolute;transform:translateX(-50%);cursor:pointer;text-align:center;width:90px}
.tl-node .dot{width:14px;height:14px;border-radius:50%;background:var(--teal);margin:0 auto;border:2px solid var(--paper);box-shadow:var(--shadow)}
.tl-node .lbl{font-family:var(--serif);font-size:14px;margin-top:6px}
.tl-node .yr{font-size:10px;color:var(--ink3)}
.tl-node.ev .dot{background:var(--ochre)}
.tl-node:hover .lbl{color:var(--teal)}
.tl-stem{position:absolute;width:2px;background:var(--border2)}
.tl-dot{position:absolute;width:13px;height:13px;border-radius:50%;background:var(--teal);border:2px solid var(--paper);transform:translate(-50%,-50%);box-shadow:var(--shadow);z-index:3}
.tl-dot.ev{background:var(--ochre)}
.tl-line{position:absolute;width:1.5px;background:var(--border2);transform:translateX(-50%);z-index:1}
.tl-lbl{position:absolute;transform:translateX(-50%);text-align:center;width:118px;z-index:2}
.tl-lbl .t{font-family:var(--serif);font-size:14px;line-height:1.25;white-space:nowrap}
.tl-lbl .y{font-size:10px;color:var(--ink3)}
.tl-lbl.ev .t{color:var(--ink2)}
.tl-lbl:not(.ev){cursor:pointer}
.tl-lbl:not(.ev):hover .t{color:var(--teal)}

/* ══════════ 详情页 ══════════ */
#v-detail{max-width:860px;margin:0 auto}
.d-back{color:var(--ink2);font-size:14px;margin-bottom:16px;display:inline-flex;gap:6px;align-items:center}
.d-back:hover{color:var(--teal)}
.d-hero{background:var(--paper2);border:1px solid var(--border);border-radius:var(--r2);
  padding:34px 32px;text-align:center;box-shadow:var(--shadow);margin-bottom:18px;position:relative;overflow:hidden}
.d-hero .d-meta{font-size:14px;color:var(--ink2);margin-bottom:10px}
.d-hero .d-meta .dyn{color:var(--ochre)}
.d-hero h1{font-family:var(--serif);font-size:clamp(30px,6vw,46px);font-weight:700;letter-spacing:.1em;margin-bottom:18px}
.d-verse{font-family:var(--serif);font-size:clamp(18px,3.4vw,24px);line-height:2.5}
.d-verse ruby rt{font-size:.42em;color:var(--ink3);font-family:var(--sans);letter-spacing:0}
.d-verse .ln{display:block}
.dtabs{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:16px;border-bottom:1px solid var(--border);padding-bottom:2px}
.dtab{padding:9px 15px;font-size:14px;color:var(--ink2);border-radius:10px 10px 0 0;transition:.16s;white-space:nowrap}
.dtab:hover{background:var(--paper2)}
.dtab.on{background:var(--teal);color:#fff}
.dpanel{display:none}
.dpanel.on{display:block;animation:fade .3s}
.sec{background:var(--paper2);border:1px solid var(--border);border-radius:var(--r);padding:22px 24px;
  margin-bottom:16px;box-shadow:var(--shadow)}
.sec h3{font-family:var(--serif);font-size:19px;margin-bottom:12px;display:flex;align-items:center;gap:10px}
.sec h3 .bar{width:4px;height:18px;background:var(--teal);border-radius:2px}
.sec p{color:var(--ink);font-size:15px;line-height:1.85}
.toggle-btn{margin-top:12px;font-size:13px;color:var(--teal);border:1px solid var(--teal);
  border-radius:18px;padding:4px 14px;background:var(--teal-l)}
.teacher-box{margin-top:14px;padding:14px 16px;background:var(--paper3);border-radius:10px;
  border-left:3px solid var(--ochre);font-size:14px;color:var(--ink2);display:none}
.teacher-box.on{display:block}
.parent-tip{margin-top:14px;padding:12px 16px;background:var(--teal-l);border-radius:10px;
  font-size:13px;color:var(--teal);display:none}
.parent-tip.on{display:flex;gap:8px;align-items:flex-start}
/* 注释 */
.annos{display:flex;flex-wrap:wrap;gap:10px}
.anno{background:var(--paper3);border:1px solid var(--border);border-radius:10px;padding:8px 12px;font-size:14px}
.anno b{color:var(--teal);font-family:var(--serif);font-size:16px;margin-right:6px}
/* 意象 */
.imagery{display:flex;flex-wrap:wrap;gap:10px;margin-top:6px}
.imk{display:inline-flex;align-items:center;gap:6px;background:var(--paper3);border:1px solid var(--border);
  border-radius:20px;padding:6px 14px;font-size:14px}
.imk .ie{font-size:18px}
/* 局部时间轴 */
.minihist{position:relative;padding-left:24px}
.minihist::before{content:'';position:absolute;left:7px;top:6px;bottom:6px;width:2px;background:var(--border2)}
.mh-item{position:relative;margin-bottom:14px}
.mh-item .mdot{position:absolute;left:-21px;top:4px;width:12px;height:12px;border-radius:50%;
  background:var(--paper);border:2px solid var(--teal)}
.mh-item.hi .mdot{background:var(--ochre);border-color:var(--ochre)}
.mh-item .my{font-size:13px;color:var(--ochre);font-weight:700;font-family:var(--serif)}
.mh-item .mt{font-size:14px;color:var(--ink2)}
/* 相关诗词 */
.rel-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px}
.rel-card{background:var(--paper3);border:1px solid var(--border);border-radius:10px;padding:12px;cursor:pointer;transition:.18s}
.rel-card:hover{border-color:var(--teal);transform:translateY(-2px)}
.rel-card b{font-family:var(--serif);font-size:16px;display:block}
.rel-card span{font-size:12px;color:var(--ink2)}

/* ══════════ 练习 ══════════ */
.quiz-q{background:var(--paper2);border:1px solid var(--border);border-radius:var(--r);
  padding:18px 20px;margin-bottom:14px;box-shadow:var(--shadow)}
.quiz-q .qtype{font-size:11px;color:var(--teal);border:1px solid var(--teal);border-radius:10px;
  padding:1px 8px;display:inline-block;margin-bottom:8px}
.quiz-q .qt{font-size:16px;font-weight:600;margin-bottom:12px}
.opts{display:grid;gap:8px}
.opt{padding:11px 15px;border:1px solid var(--border);border-radius:10px;background:var(--paper);
  font-size:15px;transition:.16s;text-align:left}
.opt:hover{border-color:var(--teal)}
.opt.sel{border-color:var(--teal);background:var(--teal-l)}
.opt.right{border-color:var(--bamboo);background:#e6f0e8}
.opt.wrong{border-color:var(--ochre);background:#f3e6dd}
.emo-opts{display:flex;gap:10px;flex-wrap:wrap}
.emo-opt{padding:12px 18px;border:1px solid var(--border);border-radius:14px;background:var(--paper);
  text-align:center;transition:.16s;font-size:15px}
.emo-opt .ee{font-size:26px;display:block;margin-bottom:4px}
.emo-opt:hover{border-color:var(--teal);transform:translateY(-2px)}
.emo-opt.sel{border-color:var(--teal);background:var(--teal-l)}
.emo-opt.right{border-color:var(--bamboo);background:#e6f0e8}
.emo-opt.wrong{border-color:var(--ochre);background:#f3e6dd}
/* 连线配对 */
.match-wrap{display:flex;gap:30px;position:relative}
.match-col{flex:1;display:flex;flex-direction:column;gap:10px}
.match-item{padding:11px 14px;border:1px solid var(--border);border-radius:10px;background:var(--paper);
  font-size:14px;transition:.16s;position:relative}
.match-item:hover{border-color:var(--teal)}
.match-item.sel{border-color:var(--teal);background:var(--teal-l)}
.match-item.done{border-color:var(--bamboo);background:#e6f0e8;cursor:default}
.match-svg{position:absolute;inset:0;pointer-events:none;z-index:1}
.q-explain{margin-top:12px;padding:10px 14px;background:var(--paper3);border-radius:10px;
  font-size:14px;color:var(--ink2);border-left:3px solid var(--bamboo);display:none}
.q-explain.on{display:block}
.quiz-actions{display:flex;gap:12px;align-items:center;margin-top:6px}
.btn{padding:10px 22px;border-radius:22px;background:var(--teal);color:#fff;font-size:15px;transition:.18s}
.btn:hover{filter:brightness(1.08)}
.btn.ghost{background:var(--paper2);color:var(--ink);border:1px solid var(--border)}
.quiz-result{font-family:var(--serif);font-size:18px}
.badge-pop{text-align:center;padding:20px}
.badge-pop .bg-star{font-size:50px}

/* ══════════ 学习路径 ══════════ */
#path-nodes{position:relative;max-width:520px;margin:0 auto;padding:10px 0}
.path-node{display:flex;align-items:center;gap:16px;margin-bottom:8px;position:relative}
.path-node:nth-child(even){flex-direction:row-reverse}
.path-bubble{width:74px;height:74px;border-radius:50%;display:flex;flex-direction:column;
  align-items:center;justify-content:center;background:var(--paper2);border:2px solid var(--border);
  box-shadow:var(--shadow);transition:.2s;cursor:pointer;flex-shrink:0}
.path-bubble.done{background:var(--teal);color:#fff;border-color:var(--teal)}
.path-bubble.cur{border-color:var(--ochre);border-width:3px}
.path-bubble.lock{opacity:.5;cursor:not-allowed}
.path-bubble:hover:not(.lock){transform:scale(1.06)}
.path-bubble .pn-t{font-family:var(--serif);font-size:14px;font-weight:700;text-align:center;padding:0 4px}
.path-bubble .pn-s{font-size:11px}
.path-card{flex:1;background:var(--paper2);border:1px solid var(--border);border-radius:var(--r);

const ROLE_INFO={

const ST={

  prog:{},poem:null,tab:0,qa:{},is3D:false

function lsLoad(){try{const d=JSON.parse(localStorage.getItem('pg_v1')||'{}');
  Object.assign(ST,{role:d.role||null,grade:d.grade||null,mode:d.mode||'explore',
    view:d.view||'cards',dims:{...ST.dims,...(d.dims||{})},prog:d.prog||{}});}catch(e){}}
function lsSave(){localStorage.setItem('pg_v1',JSON.stringify({
  role:ST.role,grade:ST.grade,mode:ST.mode,view:ST.view,dims:ST.dims,prog:ST.prog}));}
lsLoad();

/* ── 初始化 ── */
const roleOv=document.getElementById('role-overlay');
const gradeOv=document.getElementById('grade-overlay');
function boot(){
  if(ST.role&&ST.grade){
    roleOv.style.display='none';gradeOv.style.display='none';
    applyRole();updateChips();setMode(ST.mode,true);showView(ST.view);
  }else if(ST.role){
    roleOv.style.display='none';gradeOv.style.display='flex';
  }else{
    roleOv.style.display='flex';
  }
}

/* ── 角色 ── */
function pickRole(r){ST.role=r;lsSave();roleOv.style.display='none';
  if(ST.grade){gradeOv.style.display='none';applyRole();updateChips();setMode(ST.mode,true);showView(ST.view||'cards');}
  else gradeOv.style.display='flex';}
function openRolePick(){roleOv.style.display='flex';}
function applyRole(){
  document.body.dataset.role=ST.role;
  // 学习模式下默认进入闯关；探索模式自由
}
/* ── 年级 ── */
function pickGrade(g){ST.grade=g;lsSave();gradeOv.style.display='none';
  applyRole();updateChips();setMode(ST.mode,true);showView('grade');}
function openGradePick(){gradeOv.style.display='flex';}
function updateChips(){
  const ri=ROLE_INFO[ST.role]||ROLE_INFO.student;
  const rc=document.getElementById('role-chip');
  rc.innerHTML='<span class="ic">'+ri.ic+'</span><span>'+ri.nm+'</span>';
  document.getElementById('grade-chip').textContent=(ST.grade?ST.grade+'年级':'年级')+' ▼';
}
/* ── 模式 ── */
function setMode(m,silent){
  ST.mode=m;lsSave();
  document.getElementById('m-explore').classList.toggle('on',m==='explore');
  document.getElementById('m-learn').classList.toggle('on',m==='learn');
  if(!silent){ if(m==='learn')showView('path'); else showView('cards'); }
}

/* ══════════════════════════════════════════
   视图路由
   ══════════════════════════════════════════ */
let prevView='cards';
function showView(v){
  if(v!=='detail'){prevView=ST.view;ST.view=v;lsSave();}
  document.querySelectorAll('.view').forEach(el=>el.classList.remove('on'));
  const vt=document.getElementById('v-'+v); if(vt)vt.classList.add('on');
  document.querySelectorAll('.vtab').forEach(b=>b.classList.remove('on'));
  const tb=document.getElementById('t-'+v); if(tb)tb.classList.add('on');
  stopGraph();
  if(v==='grade')renderGradeList();
  else if(v==='cards')renderCards();
  else if(v==='graph')renderGraph();
  else if(v==='map')renderMap();
  else if(v==='timeline')renderTimeline();
  else if(v==='path')renderPath();
  window.scrollTo({top:0,behavior:'smooth'});
}
function visiblePoems(){return POEMS.filter(p=>!ST.grade||p.grade<=ST.grade);}
function starsOf(id){return ST.prog[id]||0;}
function starStr(n){return '★'.repeat(n)+'☆'.repeat(3-n);}

/* ══════════════════════════════════════════
   年级入口
   ══════════════════════════════════════════ */
const GRADE_CN=['','一','二','三','四','五','六'];
function renderGradeList(){
  const box=document.getElementById('grade-list');let h='';
  for(let g=1;g<=6;g++){
    const ps=POEMS.filter(p=>p.grade===g);
    if(!ps.length)continue;
    const locked=ST.grade&&g>ST.grade;
    h+='<div class="grade-section"><h3><span class="bar"></span>'+GRADE_CN[g]+'年级'+
       (locked?' <span style="font-size:12px;color:var(--ink3);font-weight:400">（超出当前年级，可预习）</span>':'')+'</h3><div class="glist">';
    ps.forEach(p=>{
      const st=starsOf(p.id);
      h+='<div class="gitem" onclick="openDetail(\''+p.id+'\')">'+
         '<div class="gt"><b>'+p.title+'</b><span>'+p.dyn+'·'+POETS[p.poet].name+' · '+p.volume+'</span></div>'+
         '<div class="star">'+(st?starStr(st):'未学')+'</div></div>';
    });
    h+='</div></div>';
  }
  box.innerHTML=h;
}

/* ══════════════════════════════════════════
   卡片墙
   ══════════════════════════════════════════ */
function renderFilters(){
  const moods=[...new Set(visiblePoems().map(p=>p.emo))];
  const dyns=[...new Set(visiblePoems().map(p=>p.dyn))];
  let h='<button class="fchip on" data-f="all" onclick="setFilter(this)">全部</button>';
  moods.forEach(m=>h+='<button class="fchip" data-f="emo:'+m+'" onclick="setFilter(this)">'+m+'</button>');
  dyns.forEach(d=>h+='<button class="fchip" data-f="dyn:'+d+'" onclick="setFilter(this)">'+d+'代</button>');
  document.getElementById('filters').innerHTML=h;
}
function setFilter(btn){ST.filter=btn.dataset.f;
  document.querySelectorAll('.fchip').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');renderCards(true);}
function renderCards(keepFilter){
  if(!keepFilter)renderFilters();
  let ps=visiblePoems();
  if(ST.filter&&ST.filter!=='all'){
    const[k,v]=ST.filter.split(':');
    ps=ps.filter(p=>k==='emo'?p.emo===v:p.dyn===v);
  }
  let h='';
  ps.forEach(p=>{
    const st=starsOf(p.id);
    h+='<div class="pcard" onclick="openDetail(\''+p.id+'\')">'+
       '<div class="moodbar" style="background:'+GCOL.mood+'"></div>'+
       (st?'<div class="pc-prog">'+starStr(st)+'</div>':'')+
       '<div class="pc-in">'+
       '<div class="pc-meta"><span class="dyn">'+p.dyn+'</span>·<span>'+POETS[p.poet].name+'</span>·<span>'+p.volume+'</span></div>'+
       '<div class="pc-title">'+p.title+'</div>'+
       '<div class="pc-line">'+p.lines[0].t+'</div>'+
       '<div class="pc-tags"><span class="tag">'+p.emo+'</span><span class="tag">'+p.style+'</span></div>'+
       '</div></div>';
  });
  document.getElementById('cgrid').innerHTML=h||'<p style="color:var(--ink3)">暂无诗词</p>';
}

/* ══════════════════════════════════════════
   详情页
   ══════════════════════════════════════════ */
const D_TABS=[['原文','verse'],['诗意','mean'],['诗人','poet'],['历史','hist'],['地图','map'],['图谱','graph'],['练习','quiz'],['相关','rel']];
function openDetail(id){
  const p=POEMS.find(x=>x.id===id);if(!p)return;
  ST.poem=p;ST.tab=0;ST.qa={};
  showView('detail');
  // hero
  document.getElementById('d-meta').innerHTML='<span class="dyn">'+p.dyn+'代</span> · '+POETS[p.poet].name+' · '+p.volume;
  document.getElementById('d-title').textContent=p.title;
  document.getElementById('d-verse').innerHTML=p.lines.map(l=>'<span class="ln">'+rubyLine(l)+'</span>').join('');
  // tabs
  document.getElementById('dtabs').innerHTML=D_TABS.map((t,i)=>
    '<button class="dtab'+(i===0?' on':'')+'" onclick="dTab('+i+')">'+t[0]+'</button>').join('');
  fillDetail(p);
  dTab(0);
}
function rubyLine(l){
  // 将整行按字符与拼音音节配对（拼音以空格分隔）
  const sylls=l.p.trim().split(/\s+/);
  const chars=[...l.t];let out='';let si=0;
  for(const ch of chars){
    if(/[一-龥]/.test(ch)){out+='<ruby>'+ch+'<rt>'+(sylls[si]||'').replace(/[，。？！、]/g,'')+'</rt></ruby>';si++;}
    else{out+=ch;if(/[，。？！、]/.test(ch))si++;}
  }
  return out;
}

function buildQuiz(p){
  const box=document.getElementById('dp-quiz');
  let h='';
  p.quiz.forEach((q,qi)=>{
    h+='<div class="quiz-q" id="q'+qi+'">';
    if(q.type==='choice'){
      h+='<span class="qtype">选择题</span><div class="qt">'+(qi+1)+'. '+q.q+'</div><div class="opts">'+
         q.o.map((o,oi)=>'<button class="opt" onclick="pickChoice('+qi+','+oi+')">'+o+'</button>').join('')+'</div>'+
         '<div class="q-explain"></div>';
    }else if(q.type==='emotion'){
      h+='<span class="qtype">情感选择</span><div class="qt">'+(qi+1)+'. '+q.q+'</div><div class="emo-opts">'+
         q.o.map((o,oi)=>'<button class="emo-opt" onclick="pickChoice('+qi+','+oi+')"><span class="ee">'+o.e+'</span>'+o.t+'</button>').join('')+'</div>'+
         '<div class="q-explain"></div>';
    }else if(q.type==='match'){
      const lefts=q.pairs.map((pr,i)=>({t:pr[0],i}));
      const rights=q.pairs.map((pr,i)=>({t:pr[1],i})).sort(()=>Math.random()-0.5);
      h+='<span class="qtype">连线配对</span><div class="qt">'+(qi+1)+'. '+q.q+'</div>'+
         '<div class="match-wrap" id="match'+qi+'"><svg class="match-svg"></svg>'+
         '<div class="match-col">'+lefts.map(l=>'<button class="match-item" data-side="L" data-i="'+l.i+'" onclick="pickMatch('+qi+',this)">'+l.t+'</button>').join('')+'</div>'+
         '<div class="match-col">'+rights.map(r=>'<button class="match-item" data-side="R" data-i="'+r.i+'" onclick="pickMatch('+qi+',this)">'+r.t+'</button>').join('')+'</div>'+
         '</div>';
    }
    h+='</div>';
  });
  h+='<div class="quiz-actions"><button class="btn" onclick="submitQuiz()">提交答案</button>'+
     (ST.role==='teacher'?'<button class="btn ghost" onclick="printSheet()">🖨 打印学习单</button>':'')+
     '<span class="quiz-result" id="quiz-result"></span></div>';
  box.innerHTML=h;
  ST.qa={};ST.qmatch={};
}
function pickChoice(qi,oi){
  ST.qa[qi]=oi;
  const q=document.getElementById('q'+qi);
  q.querySelectorAll('.opt,.emo-opt').forEach((b,bi)=>b.classList.toggle('sel',bi===oi));
}
let matchSel=null;
function pickMatch(qi,el){
  if(el.classList.contains('done'))return;
  const side=el.dataset.side;
  if(!matchSel){matchSel={qi,el};el.classList.add('sel');return;}
  if(matchSel.qi!==qi||matchSel.el.dataset.side===side){
    matchSel.el.classList.remove('sel');matchSel={qi,el};el.classList.add('sel');return;}
  // 一左一右
  const a=matchSel.el,b=el;
  matchSel.el.classList.remove('sel');matchSel=null;
  if(a.dataset.i===b.dataset.i){
    a.classList.add('done');b.classList.add('done');a.classList.remove('sel');
    ST.qmatch[qi]=(ST.qmatch[qi]||0)+1;
    drawMatchLine(qi,a,b);
  }else{
    a.classList.add('wrong');b.classList.add('wrong');
    setTimeout(()=>{a.classList.remove('wrong');b.classList.remove('wrong');},500);
  }
}
function drawMatchLine(qi,a,b){
  const wrap=document.getElementById('match'+qi);
  const svg=wrap.querySelector('.match-svg');
  const wr=wrap.getBoundingClientRect();
  const ar=a.getBoundingClientRect(),br=b.getBoundingClientRect();
  const x1=ar.right-wr.left,y1=ar.top+ar.height/2-wr.top;
  const x2=br.left-wr.left,y2=br.top+br.height/2-wr.top;
  const ln=document.createElementNS('http://www.w3.org/2000/svg','line');
  ln.setAttribute('x1',x1);ln.setAttribute('y1',y1);ln.setAttribute('x2',x2);ln.setAttribute('y2',y2);
  ln.setAttribute('stroke','#5a8a6a');ln.setAttribute('stroke-width','2');
  svg.appendChild(ln);
}
function submitQuiz(){
  const p=ST.poem;let correct=0,gradable=0;
  p.quiz.forEach((q,qi)=>{
    const qel=document.getElementById('q'+qi);
    if(q.type==='choice'||q.type==='emotion'){
      gradable++;
      const sel=ST.qa[qi];
      const opts=qel.querySelectorAll('.opt,.emo-opt');
      opts.forEach((b,bi)=>{b.classList.remove('sel');
        if(bi===q.a)b.classList.add('right');
        else if(bi===sel)b.classList.add('wrong');});
      if(sel===q.a)correct++;
      const ex=qel.querySelector('.q-explain');
      if(ex&&q.ex){ex.textContent='💡 '+q.ex;ex.classList.add('on');}
    }else if(q.type==='match'){
      gradable++;
      if((ST.qmatch[qi]||0)===q.pairs.length)correct++;
    }
  });
  const stars=Math.max(1,Math.round(correct/gradable*3));
  if(correct/gradable>=0.34){
    ST.prog[p.id]=Math.max(ST.prog[p.id]||0,stars);lsSave();
  }
  const res=document.getElementById('quiz-result');
  res.innerHTML='答对 '+correct+'/'+gradable+' 题 · 获得 '+'★'.repeat(stars)+' '+
    (correct===gradable?'太棒了！🎉':'继续加油！');
}

/* ══════════════════════════════════════════
   知识图谱（2D 力导向 + 伪3D）
   ══════════════════════════════════════════ */
let gNodes=[],gEdges=[],gAnim=null,gCanvas,gCtx,gDrag=null,gAngle=0;
function renderGControls(){
  const order=['poem','poet','dynasty','place','mood','imagery','style','event'];
  document.getElementById('gcontrols').innerHTML=order.map(k=>
    '<button class="dchip'+(ST.dims[k]?' on':'')+'" onclick="togDim(\''+k+'\')">'+
    '<span class="sw" style="background:'+GCOL[k]+'"></span>'+GLABEL[k]+'</button>').join('');
}
function togDim(k){if(k==='poem')return;ST.dims[k]=ST.dims[k]?0:1;lsSave();renderGControls();renderGraph();}
function buildGraph(){
  const ps=visiblePoems();
  const nodes={},edges=[];
  function add(id,type,label,ref){if(!nodes[id])nodes[id]={id,type,label,ref,
    x:0,y:0,vx:0,vy:0,z:0,r:type==='poem'?20:14};return nodes[id];}
  ps.forEach(p=>{
    const pn=add('p_'+p.id,'poem',p.title,p);
    if(ST.dims.poet){add('poet_'+p.poet,'poet',POETS[p.poet].name);edges.push(['p_'+p.id,'poet_'+p.poet]);}
    if(ST.dims.dynasty){add('dyn_'+p.dyn,'dynasty',p.dyn+'代');edges.push(['p_'+p.id,'dyn_'+p.dyn]);}
    if(ST.dims.place){add('pl_'+p.placeModern,'place',p.placeModern);edges.push(['p_'+p.id,'pl_'+p.placeModern]);}
    if(ST.dims.mood){add('mo_'+p.emo,'mood',p.emo);edges.push(['p_'+p.id,'mo_'+p.emo]);}
    if(ST.dims.style){add('st_'+p.style,'style',p.style);edges.push(['p_'+p.id,'st_'+p.style]);}
    if(ST.dims.imagery){p.imagery.forEach(im=>{add('im_'+im,'imagery',im);edges.push(['p_'+p.id,'im_'+im]);});}
    if(ST.dims.event){p.history.filter(e=>e.hi).forEach(e=>{const k='ev_'+e.t;add(k,'event',e.t.length>8?e.t.slice(0,7)+'…':e.t);edges.push(['p_'+p.id,k]);});}
  });
  const arr=Object.values(nodes);
  const W=gCanvas.clientWidth,Hh=gCanvas.clientHeight;
  arr.forEach((n,i)=>{const a=i/arr.length*Math.PI*2;
    n.x=W/2+Math.cos(a)*(120+Math.random()*120);
    n.y=Hh/2+Math.sin(a)*(90+Math.random()*90);
    n.z=(Math.random()-0.5)*240;});
  gNodes=arr;gEdges=edges.filter(e=>nodes[e[0]]&&nodes[e[1]]);
}
function renderGraph(){
  if(ST.view!=='graph')return;
  renderGControls();
  gCanvas=document.getElementById('gcanvas');gCtx=gCanvas.getContext('2d');
  sizeCanvas(gCanvas);
  buildGraph();
  document.getElementById('gpop').style.display='none';
  bindGraphEvents();
  startGraph();
}
function sizeCanvas(cv){const dpr=window.devicePixelRatio||1;
  const w=cv.clientWidth,h=cv.clientHeight;
  cv.width=w*dpr;cv.height=h*dpr;cv.getContext('2d').setTransform(dpr,0,0,dpr,0,0);}
function startGraph(){stopGraph();let t=0;
  const loop=()=>{
    if(ST.is3D){gAngle+=0.006;draw3D();}
    else{tick();draw2D();t++;}
    gAnim=requestAnimationFrame(loop);
  };gAnim=requestAnimationFrame(loop);}
function stopGraph(){if(gAnim){cancelAnimationFrame(gAnim);gAnim=null;}}
function tick(){
  const W=gCanvas.clientWidth,Hh=gCanvas.clientHeight;
  for(let i=0;i<gNodes.length;i++){const a=gNodes[i];
    for(let j=i+1;j<gNodes.length;j++){const b=gNodes[j];
      let dx=a.x-b.x,dy=a.y-b.y,d2=dx*dx+dy*dy||0.01;const d=Math.sqrt(d2);
      const f=(a.r+b.r)*(a.r+b.r)*1.4/d2;
      const fx=dx/d*f,fy=dy/d*f;a.vx+=fx;a.vy+=fy;b.vx-=fx;b.vy-=fy;}}
  gEdges.forEach(e=>{const a=gNodes.find(n=>n.id===e[0]),b=gNodes.find(n=>n.id===e[1]);if(!a||!b)return;
    let dx=b.x-a.x,dy=b.y-a.y,d=Math.sqrt(dx*dx+dy*dy)||0.01;
    const target=a.r+b.r+58,f=(d-target)*0.012;
    const fx=dx/d*f,fy=dy/d*f;a.vx+=fx;a.vy+=fy;b.vx-=fx;b.vy-=fy;});
  gNodes.forEach(n=>{n.vx+=(W/2-n.x)*0.0016;n.vy+=(Hh/2-n.y)*0.0016;
    if(n===gDrag)return;
    n.vx*=0.84;n.vy*=0.84;n.x+=n.vx;n.y+=n.vy;
    n.x=Math.max(n.r,Math.min(W-n.r,n.x));n.y=Math.max(n.r,Math.min(Hh-n.r,n.y));});
}
function draw2D(){
  const ctx=gCtx,W=gCanvas.clientWidth,Hh=gCanvas.clientHeight;
  ctx.clearRect(0,0,W,Hh);
  ctx.strokeStyle='rgba(92,92,110,.28)';ctx.lineWidth=1;
  gEdges.forEach(e=>{const a=gNodes.find(n=>n.id===e[0]),b=gNodes.find(n=>n.id===e[1]);if(!a||!b)return;
    ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.stroke();});
  gNodes.forEach(n=>{n.sx=n.x;n.sy=n.y;n.sr=n.r;drawNode(ctx,n,n.x,n.y,n.r,1);});
}
function draw3D(){
  const ctx=gCtx,W=gCanvas.clientWidth,Hh=gCanvas.clientHeight;
  const cx=W/2,cy=Hh/2,focal=520,cosA=Math.cos(gAngle),sinA=Math.sin(gAngle);
  ctx.clearRect(0,0,W,Hh);
  gNodes.forEach(n=>{
    const x=n.x-cx,z=n.z;
    const rx=x*cosA+z*sinA, rz=-x*sinA+z*cosA;
    const s=focal/(focal-rz);
    n.px=cx+rx*s;n.py=cy+(n.y-cy)*s;n.ps=s;n.prz=rz;
    n.sx=n.px;n.sy=n.py;n.sr=n.r*s;
  });
  ctx.lineWidth=1;
  gEdges.forEach(e=>{const a=gNodes.find(n=>n.id===e[0]),b=gNodes.find(n=>n.id===e[1]);if(!a||!b)return;
    ctx.strokeStyle='rgba(92,92,110,.18)';
    ctx.beginPath();ctx.moveTo(a.px,a.py);ctx.lineTo(b.px,b.py);ctx.stroke();});
  const sorted=[...gNodes].sort((a,b)=>a.prz-b.prz);
  sorted.forEach(n=>{const dim=Math.max(.45,Math.min(1,n.ps*0.8));drawNode(ctx,n,n.px,n.py,n.r*n.ps,dim);});
}
function drawNode(ctx,n,x,y,r,dim){
  ctx.save();ctx.globalAlpha=dim;
  ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);
  ctx.fillStyle=GCOL[n.type];ctx.fill();
  if(n.type==='poem'){ctx.lineWidth=2;ctx.strokeStyle='rgba(247,245,240,.9)';ctx.stroke();}
  ctx.globalAlpha=dim;ctx.fillStyle='#f7f5f0';
  ctx.font=(n.type==='poem'?'bold ':'')+Math.max(10,r*0.5)+'px var(--serif),serif';
  ctx.textAlign='center';ctx.textBaseline='middle';
  const lbl=n.label.length>4?n.label.slice(0,4):n.label;
  ctx.fillText(lbl,x,y);
  ctx.restore();
}
function graphHit(mx,my){
  for(let i=gNodes.length-1;i>=0;i--){const n=gNodes[i];
    const dx=mx-(n.sx||n.x),dy=my-(n.sy||n.y);
    if(dx*dx+dy*dy<=(n.sr||n.r)*(n.sr||n.r))return n;}
  return null;
}
function bindGraphEvents(){
  const cv=gCanvas;if(cv._bound)return;cv._bound=true;
  const tip=document.getElementById('gtooltip');
  const pos=e=>{const r=cv.getBoundingClientRect();const t=e.touches?e.touches[0]:e;
    return{x:t.clientX-r.left,y:t.clientY-r.top};};
  cv.addEventListener('mousemove',e=>{const{x,y}=pos(e);
    if(gDrag&&!ST.is3D){gDrag.x=x;gDrag.y=y;gDrag.vx=0;gDrag.vy=0;return;}
    const n=graphHit(x,y);
    if(n){tip.textContent=GLABEL[n.type]+'：'+n.label;tip.style.left=x+12+'px';tip.style.top=y+'px';tip.style.opacity=1;cv.style.cursor='pointer';}
    else{tip.style.opacity=0;cv.style.cursor='default';}});
  cv.addEventListener('mousedown',e=>{const{x,y}=pos(e);const n=graphHit(x,y);if(n&&!ST.is3D)gDrag=n;});
  window.addEventListener('mouseup',()=>{gDrag=null;});
  cv.addEventListener('click',e=>{const{x,y}=pos(e);const n=graphHit(x,y);
    if(n)showGPop(n,x,y);else document.getElementById('gpop').style.display='none';});
  // touch
  cv.addEventListener('touchstart',e=>{const{x,y}=pos(e);const n=graphHit(x,y);if(n){if(!ST.is3D)gDrag=n;showGPop(n,x,y);}},{passive:true});
  cv.addEventListener('touchmove',e=>{if(gDrag&&!ST.is3D){const{x,y}=pos(e);gDrag.x=x;gDrag.y=y;gDrag.vx=0;gDrag.vy=0;}},{passive:true});
  cv.addEventListener('touchend',()=>{gDrag=null;});
}
function showGPop(n,x,y){
  const pop=document.getElementById('gpop');
  let h='<h4>'+n.label+'</h4><p>'+GLABEL[n.type];
  if(n.type==='poem'){const p=n.ref;h+='：'+p.dyn+'代 '+POETS[p.poet].name+'<br>'+p.lines[0].t+'</p>'+
    '<button onclick="openDetail(\''+p.id+'\')">查看详情 →</button>';}
  else if(n.type==='poet'){const key=n.id.slice(5);const po=POETS[key];h+='<br>'+po.dyn+'代 · '+po.years+'</p>';}
  else h+='</p>';
  pop.innerHTML=h;
  const W=gCanvas.clientWidth;
  pop.style.left=Math.min(x,W-240)+'px';pop.style.top=(y+14)+'px';pop.style.display='block';
}
function toggle3D(){
  ST.is3D=!ST.is3D;gDrag=null;
  document.getElementById('btn-3d').classList.toggle('on',ST.is3D);
  document.getElementById('btn-3d').textContent=ST.is3D?'🌐 退出立体模式':'🌐 切换立体模式';
  document.getElementById('gpop').style.display='none';
}
/* 详情页迷你图谱 */
function renderMiniGraph(p){
  const cv=document.getElementById('mgcanvas');if(!cv)return;
  const ctx=cv.getContext('2d');sizeCanvas(cv);
  const W=cv.clientWidth,Hh=cv.clientHeight,cx=W/2,cy=Hh/2;
  const items=[['poem',p.title],['poet',POETS[p.poet].name],['dynasty',p.dyn+'代'],
    ['place',p.placeModern],['mood',p.emo],['style',p.style]];
  p.imagery.slice(0,3).forEach(im=>items.push(['imagery',im]));
  ctx.clearRect(0,0,W,Hh);
  const sat=items.slice(1);
  ctx.strokeStyle='rgba(92,92,110,.3)';ctx.lineWidth=1;
  sat.forEach((it,i)=>{const a=i/sat.length*Math.PI*2-Math.PI/2;
    const x=cx+Math.cos(a)*Math.min(W,Hh)*0.34,y=cy+Math.sin(a)*Math.min(W,Hh)*0.34;
    it._x=x;it._y=y;ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(x,y);ctx.stroke();});
  sat.forEach(it=>{drawMiniNode(ctx,it[0],it[1],it._x,it._y,14);});
  drawMiniNode(ctx,'poem',p.title,cx,cy,22);

function buildMapSVG(){
  let ps=visiblePoems(); if(mapDyn!=='all')ps=ps.filter(p=>p.dyn===mapDyn);
  const places={};
  ps.forEach(p=>{const k=p.placeModern; if(!places[k])places[k]={modern:p.placeModern,ancient:p.place.split('（')[0],xy:GEOXY[k],poems:[]}; places[k].poems.push(p);});
  const arr=Object.values(places).filter(pl=>pl.xy);
  function nb(pl){return arr.filter(o=>o!==pl && Math.hypot(o.xy[0]-pl.xy[0],o.xy[1]-pl.xy[1])<78).length;}
  let dots='',labels='';
  arr.forEach(pl=>{const x=pl.xy[0],y=pl.xy[1];
    dots+='<circle cx="'+x+'" cy="'+y+'" r="10" fill="none" stroke="#2d3a4a" stroke-width="1" opacity=".14"/>'+
          '<circle class="map-marker" cx="'+x+'" cy="'+y+'" r="6" fill="#2d3a4a" style="cursor:pointer" data-place="'+pl.modern+'"/>';});
  function emit(pl,lx,ly,leader){
    var big=(mapName==='modern')?pl.modern.replace(/^今/,''):placeName(pl);
    var small=(mapName==='modern')?placeName(pl):pl.modern;
    if(leader)labels+='<line x1="'+pl.xy[0].toFixed(1)+'" y1="'+pl.xy[1].toFixed(1)+'" x2="'+(lx-3).toFixed(1)+'" y2="'+(ly-4).toFixed(1)+'" stroke="#8a7040" stroke-width=".8" opacity=".5"/>';
    labels+='<text x="'+lx.toFixed(1)+'" y="'+ly.toFixed(1)+'" font-size="15" fill="#2d3a4a" font-weight="700" font-family="serif" style="pointer-events:none">'+big+'</text>'+
            '<text x="'+lx.toFixed(1)+'" y="'+(ly+14).toFixed(1)+'" font-size="11" fill="#7a6030" style="pointer-events:none">'+small+'</text>';}
  const crowded=arr.filter(pl=>nb(pl)>=2 && pl.xy[0]>600).sort((a,b)=>a.xy[1]-b.xy[1]);
  const inline=arr.filter(pl=>crowded.indexOf(pl)<0).sort((a,b)=>a.xy[1]-b.xy[1]);
  const placed=[];
  inline.forEach(pl=>{let lx=pl.xy[0]+12,ly=pl.xy[1]-1,tries=0;
    const w=Math.max(placeName(pl).length,pl.modern.length+1)*15+14;
    while(placed.some(b=>lx<b.x+b.w&&lx+w>b.x&&(ly-16)<b.y+b.h&&(ly+16)>b.y)&&tries<60){ly+=7;tries++;}
    placed.push({x:lx,y:ly-16,w:w,h:30});
    emit(pl,lx,ly,Math.abs(ly-(pl.xy[1]-1))>5);});
  // 拥挤簇 → 右侧海域成列
  const colX=VW-152; let prevY=-1e9;
  crowded.forEach(pl=>{let ly=Math.max(pl.xy[1], prevY+32); prevY=ly; emit(pl,colX,ly,true);});
  let route='';
  if(mapPoet&&ROUTES[mapPoet]){ const r=ROUTES[mapPoet];
    route='<polyline points="'+r.map(p=>p[0].toFixed(1)+','+p[1].toFixed(1)).join(' ')+'" fill="none" stroke="#5a4a8a" stroke-width="2.6" stroke-dasharray="8,6" opacity=".82" stroke-linejoin="round"/>';
    r.forEach(function(p,i){var x=p[0].toFixed(1),y=p[1].toFixed(1);
      route+='<circle cx="'+x+'" cy="'+y+'" r="9.5" fill="#5a4a8a" stroke="#f7f5f0" stroke-width="1.6"/>'+
             '<text x="'+x+'" y="'+y+'" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="700" fill="#f7f5f0" style="pointer-events:none">'+(i+1)+'</text>';});
    const s=r[0]; route+='<text x="'+(s[0]-12).toFixed(1)+'" y="'+(s[1]+26).toFixed(1)+'" font-size="13" fill="#5a4a8a" font-family="serif" font-weight="700">'+POETS[mapPoet].name+'·足迹（①→②顺序）</text>';
  }
  let regions=''; REGIONS.forEach(function(rg){const xy=proj(rg[1],rg[2]); regions+='<text x="'+xy[0].toFixed(1)+'" y="'+xy[1].toFixed(1)+'" text-anchor="middle" font-size="17" fill="#9a8050" opacity=".45" font-style="italic" font-family="serif" style="pointer-events:none">'+rg[0]+'</text>';});
  const rl1=proj(112.5,33.5), rl2=proj(118.5,32.6);
  const rlabels='<text x="'+rl1[0].toFixed(1)+'" y="'+rl1[1].toFixed(1)+'" font-size="13" fill="#5a8aa0" opacity=".7" font-family="serif" font-style="italic">黄河</text>'+
                '<text x="'+rl2[0].toFixed(1)+'" y="'+rl2[1].toFixed(1)+'" font-size="13" fill="#5a8aa0" opacity=".7" font-family="serif" font-style="italic">长江</text>';
  const terrainLayer=mapTerrain
    ?('<path d="'+PROVPATH+'" fill="#ddd0a6"/>'+reliefImg('landclip')+'<path d="'+PROVPATH+'" fill="none" stroke="#9a8050" stroke-width=".7" stroke-linejoin="round"/>')
    :('<path d="'+PROVPATH+'" fill="#e7ddb6" stroke="#a98f5e" stroke-width=".7" stroke-linejoin="round"/>');
  const rangeL=mapTerrain?rangeLabelsSVG():'';
  const svg='<svg id="mapsvg" viewBox="0 0 '+VW+' '+VH+'" xmlns="http://www.w3.org/2000/svg">'+
    '<defs><clipPath id="landclip"><path d="'+PROVPATH+'"/></clipPath></defs>'+
    '<g id="mapZoomG">'+
    terrainLayer+
    riversSVG(2.0,1.6,.55)+regions+rangeL+rlabels+landmarksSVG()+dots+route+labels+
    '</g>'+
    '<rect x="4" y="4" width="'+(VW-8)+'" height="'+(VH-8)+'" fill="none" stroke="#c8b870" stroke-width="5" opacity=".3" pointer-events="none"/>'+
    '<text x="'+(VW-30)+'" y="56" text-anchor="end" font-size="30" fill="#5a4030" opacity=".7" font-weight="800" font-family="serif" pointer-events="none">詩詞輿圖</text>'+
    '</svg>';
  document.getElementById('mapsvg-holder').innerHTML=svg;
  document.getElementById('map-pop').style.display='none';
  document.querySelectorAll('.map-marker').forEach(mk=>mk.addEventListener('click',function(e){showMapPop(places[mk.dataset.place],e);}));
  applyZoom(); bindMapZoom(); ensureZoomCtrl();
}
/* ── 地图缩放/平移 ── */
let mapK=1,mapTX=0,mapTY=0;
function clampZoom(){mapK=Math.max(1,Math.min(6,mapK));
  mapTX=Math.max(VW*(1-mapK),Math.min(0,mapTX)); mapTY=Math.max(VH*(1-mapK),Math.min(0,mapTY));}
function applyZoom(){const g=document.getElementById('mapZoomG');if(g)g.setAttribute('transform','translate('+mapTX.toFixed(2)+' '+mapTY.toFixed(2)+') scale('+mapK.toFixed(4)+')');}
function zoomAt(vbx,vby,factor){const nk=Math.max(1,Math.min(6,mapK*factor));factor=nk/mapK;
  mapTX=vbx-(vbx-mapTX)*factor; mapTY=vby-(vby-mapTY)*factor; mapK=nk; clampZoom(); applyZoom();}
function svgPt(e){const sv=document.getElementById('mapsvg');const r=sv.getBoundingClientRect();
  const ratio=VW/r.width; const cx=(e.touches?e.touches[0].clientX:e.clientX), cy=(e.touches?e.touches[0].clientY:e.clientY);
  return {x:(cx-r.left)*ratio, y:(cy-r.top)*ratio, ratio};}
function zoomCenter(factor){const sv=document.getElementById('mapsvg');const r=sv.getBoundingClientRect();const ratio=VW/r.width;
  zoomAt(r.width/2*ratio, r.height/2*ratio, factor);}
function resetZoom(){mapK=1;mapTX=0;mapTY=0;applyZoom();}
function bindMapZoom(){const sv=document.getElementById('mapsvg');if(!sv||sv._zbound)return;sv._zbound=true;
  sv.addEventListener('wheel',function(e){e.preventDefault();const p=svgPt(e);zoomAt(p.x,p.y,e.deltaY<0?1.18:1/1.18);},{passive:false});
  sv.addEventListener('dblclick',function(e){const p=svgPt(e);zoomAt(p.x,p.y,1.6);});
  let drag=false,lx=0,ly=0,moved=0,ratio=1;
  sv.addEventListener('pointerdown',function(e){if(e.target.classList&&e.target.classList.contains('map-marker'))return;
    drag=true;moved=0;lx=e.clientX;ly=e.clientY;ratio=VW/sv.getBoundingClientRect().width;sv.classList.add('grabbing');sv.setPointerCapture&&sv.setPointerCapture(e.pointerId);});
  sv.addEventListener('pointermove',function(e){if(!drag)return;const dx=(e.clientX-lx),dy=(e.clientY-ly);moved+=Math.abs(dx)+Math.abs(dy);
    mapTX+=dx*ratio;mapTY+=dy*ratio;lx=e.clientX;ly=e.clientY;clampZoom();applyZoom();});
  const up=function(){drag=false;sv.classList.remove('grabbing');};
  sv.addEventListener('pointerup',up);sv.addEventListener('pointerleave',up);sv.addEventListener('pointercancel',up);
}
function ensureZoomCtrl(){const wrap=document.getElementById('mapwrap');
  if(!window._mapPopClose){window._mapPopClose=true;
    document.addEventListener('click',function(e){const pop=document.getElementById('map-pop');
      if(!pop||pop.style.display!=='block')return;
      if(e.target.closest&&(e.target.closest('.map-marker')||e.target.closest('#map-pop')))return;
      pop.style.display='none';});}
  if(document.getElementById('map-zoom-ctrl'))return;
  const d=document.createElement('div');d.id='map-zoom-ctrl';d.className='map-zoom-ctrl';
  d.innerHTML='<button title="放大" onclick="zoomCenter(1.4)">＋</button>'+
              '<button title="缩小" onclick="zoomCenter(1/1.4)">－</button>'+

/* ══════════════════════════════════════════

function renderTimeline(){
  const inner=document.getElementById('tl-inner');
  const ERAS=[['唐','618–907',0.0],['宋','960–1279',0.46],['元','1271–1368',0.74],['明','1368–1644',0.80],['清','1644–1911',0.90]];
  const Y0=618,Y1=1911,span=Y1-Y0,Wpx=2600,axisY=220,GAP=120;
  const xOf=year=>{const y=parseInt((''+year).replace(/[^0-9]/g,''))||Y0;return 50+(y-Y0)/span*(Wpx-100);};
  inner.style.width=Wpx+'px';
  let h='<div class="tl-axis" style="top:'+axisY+'px"></div>';
  ERAS.forEach(e=>{const x=50+e[2]*(Wpx-100);
    h+='<div class="tl-era" style="left:'+x+'px;top:'+(axisY-20)+'px">'+e[0]+'<span class="yr">'+e[1]+'</span></div>';});
  // 事件：轴上方，按 x 邻近向上分层避让
  const evlanes=[];
  EVENTS.slice().sort((a,b)=>xOf(a.year)-xOf(b.year)).forEach(ev=>{const x=xOf(ev.year);
    let ln=0; while(evlanes[ln]!==undefined && x-evlanes[ln]<GAP)ln++; evlanes[ln]=x;
    const lblTop=axisY-60-ln*44;
    const et=ev.t.length>7?ev.t.slice(0,7)+'…':ev.t;
    h+='<div class="tl-line" style="left:'+x+'px;top:'+(lblTop+32)+'px;height:'+(axisY-(lblTop+32))+'px"></div>'+
       '<div class="tl-lbl ev" title="'+ev.t+'" style="left:'+x+'px;top:'+lblTop+'px"><div class="t">'+et+'</div><div class="y">'+ev.year+'年</div></div>'+
       '<div class="tl-dot ev" style="left:'+x+'px;top:'+axisY+'px"></div>';});
  // 诗词：轴下方，按 x 邻近向下分层避让
  const pllanes=[]; let maxLn=0;
  visiblePoems().map(p=>({p,x:xOf((''+p.createdYear).replace(/[^0-9]/g,'')||Y0)}))
    .sort((a,b)=>a.x-b.x).forEach(o=>{const x=o.x,p=o.p;
    let ln=0; while(pllanes[ln]!==undefined && x-pllanes[ln]<GAP)ln++; pllanes[ln]=x; if(ln>maxLn)maxLn=ln;
    const lblTop=axisY+22+ln*44;
    const t=p.title.length>6?p.title.slice(0,6)+'…':p.title;
    h+='<div class="tl-line" style="left:'+x+'px;top:'+axisY+'px;height:'+(lblTop-axisY)+'px"></div>'+
       '<div class="tl-dot" style="left:'+x+'px;top:'+axisY+'px"></div>'+
       '<div class="tl-lbl" title="'+p.title+'" onclick="openDetail(\''+p.id+'\')" style="left:'+x+'px;top:'+lblTop+'px"><div class="t">'+t+'</div><div class="y">'+p.dyn+'·'+p.createdYear+'</div></div>';});
  inner.style.height=(axisY+22+(maxLn+1)*44+24)+'px';
  inner.innerHTML=h;
}

/* ══════════════════════════════════════════
   搜索（5 维实时）
   ══════════════════════════════════════════ */
const SF=[['all','全部'],['title','诗名'],['author','作者'],['dynasty','朝代'],['place','地点'],['mood','情感']];
function initSearch(){
  document.getElementById('search-filters').innerHTML=SF.map((s,i)=>
    '<button class="sf'+(i===0?' on':'')+'" data-sf="'+s[0]+'">'+s[1]+'</button>').join('');
  document.querySelectorAll('.sf').forEach(b=>b.addEventListener('click',()=>{
    ST.sf=b.dataset.sf;document.querySelectorAll('.sf').forEach(x=>x.classList.remove('on'));
    b.classList.add('on');doSearch();}));
  const inp=document.getElementById('search-input');
  inp.addEventListener('input',doSearch);
  document.getElementById('search-close').addEventListener('click',closeSearch);
  document.getElementById('search-panel').addEventListener('click',e=>{
    if(e.target.id==='search-panel')closeSearch();});
  document.addEventListener('keydown',e=>{if(e.key==='Escape')closeSearch();});
}
function openSearch(){document.getElementById('search-panel').classList.add('on');
  setTimeout(()=>document.getElementById('search-input').focus(),50);doSearch();}
function closeSearch(){document.getElementById('search-panel').classList.remove('on');}
function hl(text,q){if(!q)return text;
  try{return text.replace(new RegExp('('+q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi'),'<mark>$1</mark>');}catch(e){return text;}}
function doSearch(){
  const q=document.getElementById('search-input').value.trim();
  const sf=ST.sf;let ps=visiblePoems();
  let res=ps.filter(p=>{
    if(!q)return true;const ql=q.toLowerCase();const poet=POETS[p.poet].name;
    const f={
      title:p.title,author:poet,dynasty:p.dyn,place:p.place+p.placeModern,mood:p.emo
    };
    if(sf!=='all')return (f[sf]||'').toLowerCase().includes(ql);
    return (p.title+poet+p.dyn+p.place+p.placeModern+p.emo+p.style+p.lines.map(l=>l.t).join('')).toLowerCase().includes(ql);
  });
  const box=document.getElementById('search-results');
  if(!res.length){box.innerHTML='<div class="sres-empty">没有找到相关诗词</div>';return;}
  box.innerHTML=res.map(p=>{const poet=POETS[p.poet].name;
    return '<div class="sres" onclick="closeSearch();openDetail(\''+p.id+'\')">'+
      '<b>'+hl(p.title,q)+'</b><span class="sr-m">'+hl(p.dyn+'代',q)+' · '+hl(poet,q)+' · '+hl(p.placeModern,q)+' · '+hl(p.emo,q)+'</span>'+
      '<div class="sr-l">'+hl(p.lines[0].t,q)+'</div></div>';
  }).join('');
}

/* ══════════════════════════════════════════
   打印学习单（教师）
   ══════════════════════════════════════════ */
function buildPrintSheet(p){
  let h='<div style="padding:0;font-family:serif">'+
    '<h1 style="text-align:center;font-size:26px;margin-bottom:4px">《'+p.title+'》学习单</h1>'+
    '<p style="text-align:center;color:#555;margin-bottom:16px">'+p.dyn+'代 · '+POETS[p.poet].name+' · '+p.volume+'　　姓名：________　班级：________</p>'+
    '<div class="sec"><h3>一、诗词原文</h3><p style="font-size:18px;line-height:2.4">'+p.lines.map(l=>l.t).join('<br>')+'</p></div>'+
    '<div class="sec"><h3>二、字词注释</h3><p>'+p.anno.map(a=>a.w+'：'+a.m).join('；　')+'</p></div>'+
    '<div class="sec"><h3>三、想一想</h3>'+
    p.quiz.filter(q=>q.type==='choice').map((q,i)=>'<p>'+(i+1)+'. '+q.q+'<br>'+q.o.map((o,oi)=>'　（'+String.fromCharCode(65+oi)+'）'+o).join('')+'</p>').join('')+
    '<p>· 这首诗表达了诗人怎样的情感？请写下来：________________________________</p>'+
    '<p>· 用自己的话说说诗的意思：____________________________________________</p>'+
    '</div></div>';
  document.getElementById('print-sheet').innerHTML=h;
}
function printSheet(){if(ST.poem){buildPrintSheet(ST.poem);window.print();}}

/* ══════════════════════════════════════════
   启动
   ══════════════════════════════════════════ */
initSearch();
boot();
window.addEventListener('resize',()=>{if(ST.view==='graph'&&gCanvas){sizeCanvas(gCanvas);}});
</script>
